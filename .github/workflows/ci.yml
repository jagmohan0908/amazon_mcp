name: CI

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read

jobs:
  # ---------- Smoke gate ------------------------------------------------
  # Fails the whole CI in seconds when something fundamental is broken
  # (server module won't import, settings can't construct from env,
  # resilience primitives misbehave). Runs on a single Python version
  # since smoke checks the integration surface, not Python compatibility.
  smoke:
    name: Smoke gate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - name: Run smoke lane
        env:
          MCP_TEST_COMPAT: "true"
        run: |
          uv run pytest -q -m smoke

  tests:
    needs: smoke
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"

      - name: Install dependencies
        run: |
          uv sync --frozen

      - name: Syntax compile check
        run: |
          python -W error::SyntaxWarning -m compileall -q src tests

      # Coverage ratchet history:
      #   - Baseline (round 8): 69% (11668 stmts), floor at 65.
      #   - Round 11: ratcheted to 67.
      #   - Round 13: ratcheted to 68 (property tests pushed to 69.02%).
      #   - Round 15: ratcheted to 70 (sampling+security pushed to 70.47%).
      #   - Round 17: ratcheted to 72 (openapi loader, media negotiator,
      #     response wrapper, http/request pushed to 72.04%). Latent prod
      #     bug fixed in TokenBucket.acquire (back-pressure ordering)
      #     surfaced when round-16 tests pushed full-suite runtime past
      #     deadline-race threshold.
      #   - Round 18: ratcheted to 76 after auth-middleware helpers,
      #     token_store extras, resilient_client + scope-cleanup omit
      #     list (tool_audit/, __main__.py, html_templates.py — pure dev
      #     tooling and non-functional scope). Measured 76.42%. Latent
      #     bug pinned in test_auth_middleware_helpers: openbridge
      #     load_from_env clobbers verify_signature/iss/aud.
      #   - Round 19: ratcheted to 77 after transform_executor_helpers
      #     (62 tests, 45%→~75% on that module). Measured 77.20%.
      #     Surfaced 4th latent issue: _coerce_iso_to_epoch_ms YYYYMMDD
      #     branch is dead code. All 6 latent issues now consolidated in
      #     docs/audit/latent-issues.md (don't lose them in test comments).
      #   - Threshold lives ONLY in CI; local TDD addopts intentionally
      #     do not enforce coverage so the dev loop stays fast.
      #   - Long-term target: 80%.
      - name: Run tests (fast suite + coverage)
        env:
          MCP_TEST_COMPAT: "true"
        run: |
          uv run pytest -q -m "not slow and not smoke" \
            --cov=src/amazon_ads_mcp \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:coverage.xml \
            --cov-fail-under=77

      - name: Upload coverage artifact
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
          retention-days: 7

  # ----- report_fields catalog gates (adsv1.md §F.1) --------------------
  #
  # Drift + idempotency jobs intentionally live OUTSIDE public CI: they
  # require the source dimension/metric specs under .build/adsv1_specs/,
  # which is a private input directory excluded from this repo. Run those
  # checks locally before publishing a refreshed catalog. The negative-
  # path gate below uses a public pathological fixture and remains in CI
  # as the validator-of-validator.

  catalog-negative:
    name: report_fields refresh negative-path
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - name: Assert refresh fails on pathological fixture
        run: |
          set +e
          uv run python -m amazon_ads_mcp.build.refresh_v1_catalog \
            --source tests/fixtures/adsv1_catalog_pathological \
            --dest /tmp/negative \
            --validate
          rc=$?
          if [ "$rc" = "0" ]; then
            echo "expected non-zero exit on pathological source"
            exit 1
          fi
          echo "negative-path exit code: $rc (ok)"

  wheel-smoke:
    name: report_fields wheel smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - uses: astral-sh/setup-uv@v7
        with:
          enable-cache: true
          cache-dependency-glob: "uv.lock"
      - run: uv sync --frozen
      - name: Run slow-marker suite (wheel-content + smoke)
        run: |
          uv run pytest -q -m slow
